<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouncing Digital Clock</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            overflow: hidden; /* Prevents scrollbars when clock hits edge */
            font-family: 'Courier New', Courier, monospace; /* Digital look */
            height: 100vh;
            width: 100vw;
            user-select: none;
        }

        #clock {
            position: absolute;
            font-size: 3rem;
            font-weight: bold;
            color: #00ff00; /* Classic Terminal Green */
            text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00; /* Glow effect */
            white-space: nowrap;
            cursor: default;
            z-index: 4; /* Above snowflakes */
        }

        /* Overlay to force user interaction for Audio Context */
        #start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            z-index: 10;
            cursor: pointer;
        }

        /* Snow effect */
        .snow-container {
            position: fixed;
            inset: 0;
            pointer-events: none;      /* don't block clicks */
            overflow: hidden;
            z-index: 3;                /* behind clock, in front of background */
        }

        .snowflake {
            position: absolute;
            top: -10px;
            color: #fff;
            opacity: 0.8;
            font-size: 10px;
            animation-name: snowfall;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }

        @keyframes snowfall {
            0% {
                transform: translate3d(0, -10px, 0);
            }
            100% {
                transform: translate3d(0, 110vh, 0);
            }
        }
    </style>
</head>
<body>

    <!-- Snow container -->
    <div class="snow-container"></div>

    <div id="start-overlay">Click anywhere to start</div>

    <div id="clock">00:00:00</div>

    <script>
        const clock = document.getElementById('clock');
        const overlay = document.getElementById('start-overlay');
        
        // Movement Variables
        let x = 100;
        let y = 100;
        let dx = 3; // Horizontal Speed
        let dy = 3; // Vertical Speed
        let animationRunning = false;

        // Audio Context (Created on click to satisfy browser policies)
        let audioCtx;

        // Colors to cycle through on bounce
        const colors = ['#00ff00', '#ff00ff', '#00ffff', '#ffff00', '#ff0000'];

        // --- 1. CLOCK FUNCTIONALITY ---
        function updateTime() {
            const now = new Date();
            clock.innerText = now.toLocaleTimeString();
        }
        setInterval(updateTime, 1000); // Update text every second
        updateTime(); // Initial call

        // --- 2. SOUND SYNTHESIS (The "Boing") ---
        function playBoing() {
            if (!audioCtx) return;

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            // Sound Profile: Sine wave
            oscillator.type = 'sine';

            // Pitch Drop (The "Boing" effect)
            // Start at 300Hz, drop to 50Hz quickly
            oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);

            // Volume Envelope (Fade out)
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.3);
        }

        function changeColor() {
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            clock.style.color = randomColor;
            clock.style.textShadow = `0 0 10px ${randomColor}, 0 0 20px ${randomColor}`;
        }

        // --- 3. ANIMATION LOOP ---
        function animate() {
            if (!animationRunning) return;

            const rect = clock.getBoundingClientRect();
            const winWidth = window.innerWidth;
            const winHeight = window.innerHeight;

            // Check Horizontal Collision
            if (x + rect.width >= winWidth || x <= 0) {
                dx = -dx; // Reverse direction
                playBoing();
                changeColor();
                // Safety clamp to prevent sticking
                if (x <= 0) x = 0;
                if (x + rect.width >= winWidth) x = winWidth - rect.width;
            }

            // Check Vertical Collision
            if (y + rect.height >= winHeight || y <= 0) {
                dy = -dy; // Reverse direction
                playBoing();
                changeColor();
                // Safety clamp
                if (y <= 0) y = 0;
                if (y + rect.height >= winHeight) y = winHeight - rect.height;
            }

            // Move
            x += dx;
            y += dy;

            // Apply positions
            clock.style.left = x + 'px';
            clock.style.top = y + 'px';

            requestAnimationFrame(animate);
        }

        // --- 4. INITIALIZATION ---
        // We must wait for user interaction to start AudioContext
        document.body.addEventListener('click', () => {
            if (!animationRunning) {
                // Init Audio
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
                
                // Hide Overlay
                overlay.style.display = 'none';
                
                // Start Animation
                animationRunning = true;
                animate();
            } else if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        });

        // Handle window resize so clock doesn't get lost
        window.addEventListener('resize', () => {
            x = Math.min(x, window.innerWidth - clock.clientWidth);
            y = Math.min(y, window.innerHeight - clock.clientHeight);
        });
    </script>

    <script>
        // Snowflakes
        (function () {
            const snowContainer = document.querySelector('.snow-container');
            const numFlakes = 60; // adjust for more/less snow

            for (let i = 0; i < numFlakes; i++) {
                const flake = document.createElement('div');
                flake.className = 'snowflake';
                flake.textContent = '❄';

                // random horizontal position
                flake.style.left = Math.random() * 100 + 'vw';
                // random size
                const size = 8 + Math.random() * 12; // 8–20px
                flake.style.fontSize = size + 'px';
                // random animation duration & delay
                const duration = 8 + Math.random() * 7; // 8–15s
                const delay = Math.random() * 10;       // 0–10s
                flake.style.animationDuration = duration + 's';
                flake.style.animationDelay = delay + 's';

                snowContainer.appendChild(flake);
            }
        })();
    </script>
</body>
</html>
